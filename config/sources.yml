# ============================================================
# KAYNAK LİSTESİ
# ------------------------------------------------------------
# type: rss   -> feedparser ile okunur
# type: html  -> requests + BeautifulSoup ile okunur
#
# trusted: true        -> prefilter atlanır, her yeni içerik LLM'e gider
# keyword_list: <isim> -> hangi kelime grubuyla filtreleneceği
#                         (varsayılan: "default", Türk ulusal medya
#                          için: "turkey_major")
#
# Kurulumdan sonra şunu çalıştırıp 0 item dönen kaynakları düzelt:
#   python -m src.main --test-sources
# ============================================================

sources:
  # ================= MÜNİH / BAVYERA MEDYASI =================
  - name: "Merkur München"
    type: rss
    url: "https://www.merkur.de/lokales/muenchen/rssfeed.rdf"

  - name: "Merkur Bayern"
    type: rss
    url: "https://www.merkur.de/bayern/rssfeed.rdf"

  - name: "tz München"
    type: rss
    url: "https://www.tz.de/muenchen/rssfeed.rdf"

  - name: "Süddeutsche München"
    type: rss
    url: "https://rss.sueddeutsche.de/rss/Muenchen"

  - name: "Abendzeitung München"
    type: rss
    url: "https://www.abendzeitung-muenchen.de/storage/rss/rss/muenchen-news-abendzeitung.xml"

  - name: "Abendzeitung Bayern"
    type: rss
    url: "https://www.abendzeitung-muenchen.de/storage/rss/rss/bayern-abendzeitung.xml"

  - name: "Abendzeitung Kultur"
    # Konser ve etkinlik duyuruları için değerli
    type: rss
    url: "https://www.abendzeitung-muenchen.de/storage/rss/rss/kultur-news-abendzeitung.xml"

  - name: "BR24"
    # Adres --test-sources ile doğrulanmalı; 0 dönerse br.de'de "RSS" ara
    type: rss
    url: "https://www.br.de/nachrichten/rss"

  # ================= TÜRKİYE ULUSAL MEDYASI ==================
  # DİKKAT: Bu kaynaklar dar "turkey_major" listesiyle filtrelenir.
  # Sadece deprem/seçim/milli takım gibi büyük olaylar ve
  # Almanya/gurbetçi/vize içeren haberler geçer.

  - name: "TRT Haber Son Dakika"
    type: rss
    url: "https://www.trthaber.com/sondakika.rss"
    keyword_list: turkey_major

  - name: "NTV Gündem"
    type: rss
    url: "https://www.ntv.com.tr/gundem.rss"
    keyword_list: turkey_major

  - name: "Hürriyet Anasayfa"
    type: rss
    url: "https://www.hurriyet.com.tr/rss/anasayfa"
    keyword_list: turkey_major

  # ================= RESMİ / KONSOLOSLUK =====================
  - name: "T.C. Münih Başkonsolosluğu Duyurular"
    type: html
    url: "https://munih-bk.mfa.gov.tr/Mission"
    trusted: true
    item_selector: "a"
    link_must_contain: "showannouncement"

  # ================= ETKİNLİK / KONSER =======================
  # Venue sayfalarının resmi RSS'i yok; HTML taraması için her sitenin
  # kendi selector'u ayarlanmalı. Şablonlar aşağıda kapalı duruyor —
  # açmak istersen selector'u siteye göre ayarlamak gerekiyor,
  # bunu birlikte yaparız.
  - name: "Muffatwerk Events"
    type: html
    url: "https://muffatwerk.de/de/events"
    item_selector: "a"
    enabled: false

  - name: "Backstage München"
    type: html
    url: "https://backstage.eu/veranstaltungen/live.html"
    item_selector: "a"
    enabled: false

  - name: "Olympiapark Events"
    type: html
    url: "https://www.olympiapark.de/de/veranstaltungen-tickets/veranstaltungen"
    item_selector: "a"
    enabled: false

name: konser-scan

on:
  schedule:
    # Her gün 06:17 UTC (yazın 08:17 Münih saati). Dakika bilerek
    # :00/:30'dan farklı seçildi ki haber taramasıyla aynı anda
    # çalışıp state dosyasında çakışmasınlar.
    - cron: "17 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: radar-state
  cancel-in-progress: false

jobs:
  konser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Konser taramasını çalıştır
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
        run: python -m src.main --concerts

      - name: State'i commit'le
        run: |
          git config user.name "radar-bot"
          git config user.email "radar-bot@users.noreply.github.com"
          git add data/seen.json
          git diff --cached --quiet || git commit -m "chore: konser seen state güncelle"
          git pull --rebase -X theirs
          git push || (git pull --rebase -X theirs && git push)

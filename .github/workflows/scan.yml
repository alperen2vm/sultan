name: radar-scan

on:
  schedule:
    # Tuhaf dakikalar bilinçli: :00/:30 kalabalığından kaçıyoruz.
    # 20 dk'da bir deneme = gecikme/atlama olsa bile boşluk ~1 saati aşmaz.
    - cron: "9,29,49 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: radar-state
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Taramayı çalıştır
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.main

      - name: State'i commit'le
        run: |
          git config user.name "radar-bot"
          git config user.email "radar-bot@users.noreply.github.com"
          git add data/seen.json
          git diff --cached --quiet || git commit -m "chore: seen state güncelle"
          git pull --rebase -X theirs
          git push || (git pull --rebase -X theirs && git push)

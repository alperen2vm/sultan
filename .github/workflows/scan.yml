name: radar-scan

on:
  schedule:
    # Her 30 dakikada bir. Not: GitHub Actions cron'u dakikası dakikasına
    # garanti etmez, yoğun saatlerde 5-15 dk gecikebilir — bu iş için sorun değil.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}  # Actions sekmesinden elle tetiklemek için

permissions:
  contents: write  # seen.json'u repo'ya geri commit'lemek için

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Taramayı çalıştır
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.main

      - name: State'i commit'le
        run: |
          git config user.name "radar-bot"
          git config user.email "radar-bot@users.noreply.github.com"
          git add data/seen.json
          git diff --cached --quiet || git commit -m "chore: seen state güncelle"
          git push
